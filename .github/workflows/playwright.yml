name: Playwright Tests

on:
  push:
    branches: [d28-automation-suite, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cài đặt dependencies
        run: npm ci

      - name: Cài Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Chạy Playwright tests
        run: npx playwright test --workers=2
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 3
          
      - name: Phân tích kết quả test
        if: always()
        run: |
          echo "=== TEST SUMMARY ==="
          if [ -f playwright-report/index.html ]; then
            echo "✅ HTML Report đã được tạo"
          else
            echo "❌ Không tìm thấy HTML Report"
          fi
          
          if [ $? -eq 0 ]; then
            echo "✅ Tests PASSED"
          else
            echo "❌ Tests FAILED - Cần review!"
          fi